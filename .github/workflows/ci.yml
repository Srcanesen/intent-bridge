name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm format:check && corepack pnpm lint && corepack pnpm typecheck
      - run: corepack pnpm test && corepack pnpm build
      - run: corepack pnpm benchmark -- validate-fixtures --cases benchmarks/cases
      - run: corepack pnpm build && git diff --exit-code -- packages/pi-extension/dist/index.js
      - run: corepack pnpm release:smoke
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: node scripts/scan-secrets.mjs --self-test && corepack pnpm scan:secrets
      - run: corepack pnpm audit --prod --audit-level=high
  pi-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pi_version: ["0.80.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: test "$(node -p "require('./packages/pi-extension/node_modules/@earendil-works/pi-coding-agent/package.json').version")" = "${{ matrix.pi_version }}"
      - run: corepack pnpm typecheck
      - run: corepack pnpm exec vitest run packages/pi-extension/test/pi-host-adapter.test.ts packages/pi-extension/test/pi-native-provider.test.ts packages/pi-extension/test/index.test.ts
  pi-latest:
    if: github.event_name == 'schedule'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Install latest Pi in an ephemeral directory
        run: |
          mkdir -p "$RUNNER_TEMP/pi-latest"
          printf '{"private":true}\n' > "$RUNNER_TEMP/pi-latest/package.json"
          corepack pnpm --dir "$RUNNER_TEMP/pi-latest" add @earendil-works/pi-coding-agent@latest
          node -p "require(process.argv[1]).version" "$RUNNER_TEMP/pi-latest/node_modules/@earendil-works/pi-coding-agent/package.json"
          rm -rf packages/pi-extension/node_modules/@earendil-works
          ln -s "$RUNNER_TEMP/pi-latest/node_modules/@earendil-works" packages/pi-extension/node_modules/@earendil-works
      - run: corepack pnpm typecheck
      - run: corepack pnpm exec vitest run packages/pi-extension/test/pi-host-adapter.test.ts packages/pi-extension/test/pi-native-provider.test.ts packages/pi-extension/test/index.test.ts

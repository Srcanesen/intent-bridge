name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm format:check && corepack pnpm lint && corepack pnpm typecheck
      - run: corepack pnpm test && corepack pnpm build
      - run: corepack pnpm benchmark -- validate-fixtures --cases benchmarks/cases
      - run: corepack pnpm build && git diff --exit-code -- packages/pi-extension/dist/index.js
      - run: corepack pnpm release:smoke
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: node scripts/scan-secrets.mjs --self-test && corepack pnpm scan:secrets
      - run: corepack pnpm audit --prod --audit-level=high
